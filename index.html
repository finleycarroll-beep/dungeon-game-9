<!DOCTYPE html>
<html>
<head>
<title>Dungeon RPG V6</title>
<style>
body{margin:0;background:#0b0b0b;color:white;font-family:sans-serif;text-align:center}
canvas{background:#101010;border:4px solid #555;margin-top:10px;image-rendering:pixelated}
#ui{margin-top:8px}
button{padding:6px 12px;margin:6px;background:#333;color:white;border:1px solid #666;cursor:pointer}
</style>
</head>
<body>
<h2>Dungeon RPG V6</h2>
<canvas id="game" width="768" height="768"></canvas>
<canvas id="minimap" width="180" height="180"></canvas>
<div id="ui"></div>

<script>
const canvas=document.getElementById("game");
const ctx=canvas.getContext("2d");
const minimap=document.getElementById("minimap");
const mctx=minimap.getContext("2d");
const ui=document.getElementById("ui");

const TILE=24;
const SIZE=32;

let gameState="menu";
let floor=1;

function rand(a,b){return Math.floor(Math.random()*(b-a))+a}

/* AUDIO */
const audioCtx=new (window.AudioContext||window.webkitAudioContext)();
function beep(freq,time=0.1){
 const osc=audioCtx.createOscillator();
 const gain=audioCtx.createGain();
 osc.frequency.value=freq;
 osc.connect(gain);
 gain.connect(audioCtx.destination);
 gain.gain.value=0.05;
 osc.start();
 osc.stop(audioCtx.currentTime+time);
}

/* MENU */
function showMenu(){
 gameState="menu";
 ui.innerHTML=`
 <h3>Main Menu</h3>
 <button onclick="startGame()">Start Game</button>
 <button onclick="loadGame(1)">Load Slot 1</button>
 <button onclick="loadGame(2)">Load Slot 2</button>
 <button onclick="loadGame(3)">Load Slot 3</button>
 `;
}

/* MAP GENERATION WITH CORRIDORS */
function generateFloor(){
 let map=[];
 for(let y=0;y<SIZE;y++){
  map[y]=[];
  for(let x=0;x<SIZE;x++) map[y][x]=1;
 }

 let rooms=[];

 for(let r=0;r<10;r++){
  let w=rand(5,10);
  let h=rand(5,10);
  let x=rand(1,SIZE-w-1);
  let y=rand(1,SIZE-h-1);

  for(let yy=y;yy<y+h;yy++)
   for(let xx=x;xx<x+w;xx++)
    map[yy][xx]=0;

  rooms.push({x:x+w/2,y:y+h/2});
 }

 for(let i=1;i<rooms.length;i++){
  let a=rooms[i-1];
  let b=rooms[i];

  let x=a.x;
  while(x!=b.x){map[Math.floor(a.y)][Math.floor(x)]=0;x+=Math.sign(b.x-x)}

  let y=a.y;
  while(y!=b.y){map[Math.floor(y)][Math.floor(b.x)]=0;y+=Math.sign(b.y-y)}
 }

 map[rand(3,SIZE-3)][rand(3,SIZE-3)]=2;

 return map;
}

let map=generateFloor();

/* PLAYER */
let player={
 x:4,y:4,
 hp:120,maxHp:120,
 level:1,xp:0,xpNext:60,
 attack:12,defense:4,
 fireball:25,
 gold:0
};

let inventory=[];
let skillPoints=0;

/* ENEMIES */
let enemies=[];

const enemyTypes=[
 {name:"goblin",hp:30,atk:7,color:"#4caf50"},
 {name:"skeleton",hp:40,atk:9,color:"#dddddd"},
 {name:"slime",hp:25,atk:6,color:"#33e0c4"},
 {name:"orc",hp:50,atk:11,color:"#7f8c2f"},
 {name:"mage",hp:30,atk:13,color:"#9b59b6"},
 {name:"archer",hp:30,atk:10,color:"#b9770e"},
 {name:"demon",hp:60,atk:14,color:"#c0392b"},
 {name:"bat",hp:20,atk:5,color:"#6c5ce7"}
];

let projectiles=[];

function spawnEnemies(){
 enemies=[];

 for(let i=0;i<15+floor;i++){
  let t=enemyTypes[rand(0,enemyTypes.length)];

  let x=rand(1,SIZE-2);
  let y=rand(1,SIZE-2);

  if(map[y][x]==0){
   enemies.push({
    x,y,
    type:t.name,
    color:t.color,
    hp:t.hp+floor*3,
    maxHp:t.hp+floor*3,
    atk:t.atk+floor
   });
  }
 }

 if(floor%5==0){
  enemies.push({x:SIZE/2,y:SIZE/2,type:"dragon",color:"#ff4444",hp:400,maxHp:400,atk:20});
 }
}

spawnEnemies();

/* CHESTS */
let chests=[];
function spawnChests(){
 chests=[];
 for(let i=0;i<6;i++){
  let x=rand(1,SIZE-2);
  let y=rand(1,SIZE-2);
  if(map[y][x]==0) chests.push({x,y,open:false});
 }
}
spawnChests();

/* DRAW */
function drawTile(x,y,t){
 if(t==1) ctx.fillStyle="#2c2c2c";
 else if(t==2) ctx.fillStyle="#caa22a";
 else ctx.fillStyle="#1a1a1a";
 ctx.fillRect(x*TILE,y*TILE,TILE,TILE);
}

function drawPlayer(){
 let px=player.x*TILE;
 let py=player.y*TILE;

 ctx.fillStyle="#3c7cff";
 ctx.fillRect(px+6,py+10,12,10);

 ctx.fillStyle="#ffd6b3";
 ctx.fillRect(px+8,py+4,8,8);
}

function drawEnemies(){
 enemies.forEach(e=>{
  let ex=e.x*TILE;
  let ey=e.y*TILE;

  ctx.fillStyle=e.color;
  ctx.fillRect(ex+6,ey+10,12,12);

  ctx.fillStyle="red";
  ctx.fillRect(ex+3,ey+2,18,3);

  ctx.fillStyle="#4cff4c";
  ctx.fillRect(ex+3,ey+2,(e.hp/e.maxHp)*18,3);
 });
}

function drawProjectiles(){
 ctx.fillStyle="orange";
 projectiles.forEach(p=>{
  ctx.fillRect(p.x*TILE+10,p.y*TILE+10,4,4);
 });
}

function drawChests(){
 chests.forEach(c=>{
  if(!c.open){
   ctx.fillStyle="#8b5a2b";
   ctx.fillRect(c.x*TILE+6,c.y*TILE+12,12,8);
  }
 });
}

function lighting(){
 const g=ctx.createRadialGradient(
 player.x*TILE+12,player.y*TILE+12,20,
 player.x*TILE+12,player.y*TILE+12,140
 );
 g.addColorStop(0,"rgba(0,0,0,0)");
 g.addColorStop(1,"rgba(0,0,0,0.9)");
 ctx.fillStyle=g;
 ctx.fillRect(0,0,canvas.width,canvas.height);
}

function drawMinimap(){
 mctx.clearRect(0,0,180,180);
 let s=180/SIZE;

 for(let y=0;y<SIZE;y++){
  for(let x=0;x<SIZE;x++){
   mctx.fillStyle=map[y][x]==1?"#333":"#aaa";
   mctx.fillRect(x*s,y*s,s,s);
  }
 }

 mctx.fillStyle="red";
 mctx.fillRect(player.x*s,player.y*s,s,s);
}

function drawUI(){
 ctx.fillStyle="white";
 ctx.fillText("HP "+player.hp+"/"+player.maxHp,10,12);
 ctx.fillText("LVL "+player.level,120,12);
 ctx.fillText("XP "+player.xp+"/"+player.xpNext,200,12);
 ctx.fillText("Gold "+player.gold,320,12);
 ctx.fillText("Floor "+floor,420,12);
}

function draw(){
 ctx.clearRect(0,0,canvas.width,canvas.height);

 for(let y=0;y<SIZE;y++)
  for(let x=0;x<SIZE;x++) drawTile(x,y,map[y][x]);

 drawChests();
 drawEnemies();
 drawProjectiles();
 drawPlayer();
 lighting();
 drawUI();
 drawMinimap();
}

/* XP */
function gainXP(v){
 player.xp+=v;
 if(player.xp>=player.xpNext){
  player.xp-=player.xpNext;
  player.level++;
  skillPoints++;
  player.maxHp+=20;
  player.hp=player.maxHp;
  player.attack+=3;
  player.xpNext=Math.floor(player.xpNext*1.5);
  beep(700);
 }
}

/* ATTACK */
function attack(){
 enemies.forEach(e=>{
  if(Math.abs(e.x-player.x)<=1 && Math.abs(e.y-player.y)<=1){
   e.hp-=Math.max(1,player.attack+rand(-3,4));
   beep(200);

   if(e.hp<=0){
    gainXP(30);
    player.gold+=20;
   }
  }
 });

 enemies=enemies.filter(e=>e.hp>0);
}

/* FIREBALL */
function fireball(){
 enemies.forEach(e=>{
  if(Math.abs(e.x-player.x)<=3 && Math.abs(e.y-player.y)<=3){
   e.hp-=player.fireball;
  }
 });

 enemies=enemies.filter(e=>e.hp>0);
 beep(120);
}

/* CHESTS */
function openChest(c){
 c.open=true;
 beep(900);

 let r=Math.random();
 if(r<0.4) inventory.push("Potion");
 else if(r<0.7) inventory.push("Dagger");
 else inventory.push("Armor");
}

/* MOVE */
function move(dx,dy){
 let nx=player.x+dx;
 let ny=player.y+dy;

 if(nx<0||ny<0||nx>=SIZE||ny>=SIZE) return;
 if(map[ny][nx]==1) return;

 let chest=chests.find(c=>c.x==nx&&c.y==ny&&!c.open);
 if(chest) openChest(chest);

 player.x=nx;
 player.y=ny;
}

/* STAIRS */
function stairs(){
 if(map[player.y][player.x]==2){
  floor++;
  map=generateFloor();
  spawnEnemies();
  spawnChests();
  player.x=4;
  player.y=4;
  saveGame(1);
 }
}

/* ENEMY AI */
function enemyTurn(){
 enemies.forEach(e=>{

  if(e.type=="archer" && Math.abs(player.x-e.x)<=5){
   projectiles.push({x:e.x,y:e.y,dx:Math.sign(player.x-e.x),dy:Math.sign(player.y-e.y)});
  }

  if(Math.abs(player.x-e.x)<=1 && Math.abs(player.y-e.y)<=1){
   player.hp-=Math.max(1,e.atk-player.defense);
  }
  else{
   let dx=Math.sign(player.x-e.x);
   let dy=Math.sign(player.y-e.y);

   if(map[e.y+dy] && map[e.y+dy][e.x+dx]==0){
    e.x+=dx;
    e.y+=dy;
   }
  }
 });

 projectiles.forEach(p=>{
  p.x+=p.dx;
  p.y+=p.dy;

  if(p.x==player.x && p.y==player.y){
   player.hp-=6;
  }
 });

 projectiles=projectiles.filter(p=>p.x>0&&p.y>0&&p.x<SIZE&&p.y<SIZE);

 if(player.hp<=0){
  alert("Game Over");
  showMenu();
 }
}

/* SAVE */
function saveGame(slot){
 localStorage.setItem("dungeonSlot"+slot,JSON.stringify({player,floor}));
}

function loadGame(slot){
 let s=localStorage.getItem("dungeonSlot"+slot);
 if(!s) return;

 let d=JSON.parse(s);
 player=d.player;
 floor=d.floor;

 startGame();
}

/* INVENTORY */
function openInventory(){
 let html="<h3>Inventory</h3>";

 inventory.forEach((i,n)=>{
  html+=`<button onclick='useItem(${n})'>${i}</button>`;
 });

 html+="<br><button onclick='closeMenu()'>Close</button>";

 ui.innerHTML=html;
 gameState="inventory";
}

function useItem(i){
 let item=inventory[i];

 if(item=="Potion") player.hp=Math.min(player.maxHp,player.hp+40);
 if(item=="Dagger") player.attack+=4;
 if(item=="Armor") player.defense+=3;

 inventory.splice(i,1);
 openInventory();
}

function closeMenu(){
 ui.innerHTML="";
 gameState="game";
}

/* START GAME */
function startGame(){
 gameState="game";
 ui.innerHTML="";
}

/* CONTROLS */
window.addEventListener("keydown",e=>{
 if(gameState!="game") return;

 if(e.key=="w") move(0,-1);
 if(e.key=="s") move(0,1);
 if(e.key=="a") move(-1,0);
 if(e.key=="d") move(1,0);
 if(e.key==" ") attack();
 if(e.key=="f") fireball();
 if(e.key=="e") stairs();
 if(e.key=="i") openInventory();

 draw();
});

setInterval(()=>{
 if(gameState=="game") enemyTurn();
 draw();
},450);

showMenu();
</script>
</body>
</html>
